<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Pi Converter | Live Rates</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --pi-purple: #673ab7;
            --pi-gold: #ffc107;
            --bg-color: #f0f2f5;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-card { background: white; width: 92%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden; }
        .header { background: var(--pi-purple); color: white; padding: 25px; text-align: center; }
        .header img { width: 55px; margin-bottom: 8px; }
        .header h2 { margin: 0; font-size: 20px; }
        .content { padding: 20px; }
        .user-section { background: #f3e5f5; border-radius: 12px; padding: 10px; margin-bottom: 15px; text-align: center; font-weight: bold; color: var(--pi-purple); border: 1px solid #d1c4e9; }
        .live-price { font-size: 13px; color: #2e7d32; margin-bottom: 15px; text-align: center; font-weight: bold; background: #e8f5e9; padding: 10px; border-radius: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: bold; color: #666; }
        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--pi-purple); outline: none; }
        .rate-box { background: #fff3e0; border: 1px solid #ffe0b2; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .result-box { background: #fff9c4; border: 2px dashed #fbc02d; padding: 15px; border-radius: 12px; text-align: center; margin-top: 10px; }
        .result-text { font-size: 26px; font-weight: 800; color: #e67e22; }
        .btn-pay { background: var(--pi-purple); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(103, 58, 183, 0.3); }
        .footer { text-align: center; padding: 15px; font-size: 10px; color: #999; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <img src="https://mine.pi/static/media/pi-logo.673ab7.png" alt="Pi Logo">
        <h2>Global Pi Converter</h2>
    </div>

    <div class="content">
        <div id="user-display" class="user-section">
            <span id="username">Checking Pi Identity...</span>
        </div>

        <div id="live-price-display" class="live-price">Loading Market Rates...</div>

        <div class="rate-box">
            <label>Today's TrueMoney Rate (1 THB = ??? MMK)</label>
            <input type="number" id="manualThbToMmk" value="138.0" step="0.1" oninput="calculateExchange()" style="background: white; border-color: #ffcc80;">
        </div>

        <div class="input-group">
            <label>Amount in Pi (π)</label>
            <input type="number" id="piAmount" placeholder="0.00" oninput="calculateExchange()">
        </div>

        <div class="input-group">
            <label>Convert To</label>
            <select id="currency" onchange="calculateExchange()">
                <option value="bitget">Bitget Market Price (USDT)</option>
                <option value="314159">GCV ($314,159 USD)</option>
                <option value="THB">Thai Baht (Live Rate)</option>
                <option value="MMK">Myanmar Kyat (TrueMoney)</option>
            </select>
        </div>

        <div class="result-box">
            <small>Estimated Value</small>
            <div id="result" class="result-text">0.00 USDT</div>
        </div>

        <button class="btn-pay" onclick="transferPi()">Transfer Pi</button>
        <div id="status"></div>
    </div>
    <div class="footer">Verified Pi Mainnet Application</div>
</div>

<script>
    let currentPiPrice = 0;
    let usdToThb = 36.30; 

    // Pi SDK စတင်ခြင်း
    Pi.init({ version: "2.0", sandbox: true });

    async function updateCurrencyRates() {
        try {
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await res.json();
            if (data.result === "success") {
                usdToThb = data.rates.THB;
                updatePriceDisplay();
            }
        } catch (e) { console.error(e); }
    }

    async function updatePiPrice() {
        try {
            const res = await fetch('https://api.bitget.com/api/v2/spot/market/tickers?symbol=PIUSDT');
            const data = await res.json();
            if (data.code === '00000') {
                currentPiPrice = parseFloat(data.data[0].lastPr);
                updatePriceDisplay();
                calculateExchange();
            }
        } catch (e) { document.getElementById('live-price-display').innerText = "Price Update Failed"; }
    }

    function updatePriceDisplay() {
        document.getElementById('live-price-display').innerText = `Pi: ${currentPiPrice} USDT | 1$ ≈ ${usdToThb.toFixed(2)} THB`;
    }

    async function auth() {
        try {
            const scopes = ['username', 'payments'];
            const authResult = await Pi.authenticate(scopes, (p) => console.log(p));
            document.getElementById('username').innerText = "👤 " + authResult.user.username;
        } catch (err) { document.getElementById('username').innerText = "Open in Pi Browser"; }
    }

    function calculateExchange() {
        const amount = document.getElementById('piAmount').value;
        const mode = document.getElementById('currency').value;
        const thbToMmk = document.getElementById('manualThbToMmk').value; 
        const resultDisplay = document.getElementById('result');
        
        let total = 0;
        let label = "";

        if (mode === "bitget") {
            total = amount * currentPiPrice;
            label = "USDT";
        } else if (mode === "314159") {
            total = amount * 314159;
            label = "GCV ($)";
        } else if (mode === "THB") {
            total = amount * currentPiPrice * usdToThb;
            label = "THB";
        } else if (mode === "MMK") {
            total = amount * currentPiPrice * usdToThb * thbToMmk;
            label = "MMK";
        }

        if (!amount || amount <= 0) {
            resultDisplay.innerText = "0.00 " + label;
            return;
        }
        resultDisplay.innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " " + label;
    }

    async function transferPi() {
        const amount = parseFloat(document.getElementById('piAmount').value);
        if(!amount || amount <= 0) { alert("Please enter a valid amount"); return; }
        
        // Pi Payment Logic
        try {
            await Pi.createPayment({
                amount: amount,
                memo: "Pi Conversion",
                metadata: { appId: "global-pi-converter-b62a0d07256a8a72" }
            }, {
                onReadyForServerApproval: (id) => console.log("Waiting for approval"),
                onReadyForServerCompletion: (id, txid) => alert("Success! TXID: " + txid),
                onCancel: (id) => console.log("Cancelled"),
                onError: (error) => console.error(error)
            });
        } catch (err) { alert("Use Pi Browser for payments."); }
    }

    auth();
    updateCurrencyRates();
    updatePiPrice();
    setInterval(updatePiPrice, 60000); 
</script>

</body>
</html>
